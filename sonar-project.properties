# SonarCloud / SonarQube Cloud configuration.
#
# IMPORTANT — verify these two values match what you see on your SonarCloud
# project's "Information" panel. The defaults below follow SonarCloud's
# auto-provision convention (org = github username lowercased, projectKey =
# <github-user>_<repo>). If your Information panel shows different values,
# update them here.
sonar.organization=joshnachary
sonar.projectKey=JoshnaChary_ReactNativeExpoProjects

sonar.projectName=ReactNativeExpoProjects
sonar.projectVersion=1.0

# Source layout
sonar.sources=src,App.tsx,index.ts
sonar.tests=src
sonar.test.inclusions=src/**/__tests__/**/*.test.ts,src/**/__tests__/**/*.test.tsx

# Exclude generated assets, config, and Phase-2 scope (view layer) from analysis
# of NEW code. They remain part of the project but are not checked for coverage
# until Phase 2 adds tests for them.
sonar.exclusions=node_modules/**,coverage/**,assets/**,**/*.d.ts,babel.config.js,jest.config.js

# Coverage — this is the critical line. Both SonarCloud and the Jest lcov
# reporter must agree on this path for the dashboard to show % coverage.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Phase-1 coverage scope: exclude presentational view layer, root navigator,
# native entrypoint, and static Figma/mock layout data. Keep these in sync with
# collectCoverageFrom in jest.config.js.
sonar.coverage.exclusions=src/view/**,src/navigation/AppNavigator.tsx,src/constants/figma*.ts,src/constants/*MockData.ts,src/constants/layout.ts,src/constants/messagingChatTheme.ts,App.tsx,index.ts,**/*.d.ts

# Phase-1 duplication scope: the view layer contains paired mobile/web
# responsive siblings whose markup is intentionally similar (same screen, two
# layouts). De-duplicating them properly requires extracting shared primitives
# with a `variant` prop — tracked as Phase 2 work alongside view-layer tests.
# Until then, exclude src/view/** from duplication detection so the dashboard
# measures only the logic layers (services, model, viewmodel, repository, hooks,
# theme, constants), which already have 0% duplication.
sonar.cpd.exclusions=src/view/**

sonar.sourceEncoding=UTF-8
